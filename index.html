<html>

<head>

  <title>Mokotahi Studios</title>
  <meta name="description" content="Mokotahi Studios is a digital studio based in Jakarta" />
  <link rel="icon" href="/favicon.png" />
  <style>
    html,
    body {
      padding: 0;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Oxygen,
        Ubuntu, Cantarell, Fira Sans, Droid Sans, Helvetica Neue, sans-serif;
      height: 100%;
      width: 100%;
      background-color: #000;
      color: #fff;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    * {
      box-sizing: border-box;
    }

    .main {
      /* thing to center */
      margin: auto;
    }

    .container {
      width: 100%;
      min-height: 50vh;
      display: grid;
    }
    
    section {
      text-align: center;
      margin: auto;
      padding: 1rem;
    }
    
    a.button1 {
     margin-top: 1rem;
     display:inline-block;
     padding:0.35em 1.2em;
     border:0.1em solid #FFFFFF;
     margin:0 0.3em 0.3em 0;
     border-radius:0.12em;
     box-sizing: border-box;
     text-decoration:none;
     font-family:'Roboto',sans-serif;
     font-weight:300;
     color:#FFFFFF;
     text-align:center;
     transition: all 0.2s;
    }
    
    a.button1:hover {
     color:#000000;
     background-color:#FFFFFF;
    }
    
    
    @media all and (max-width:30em){
     a.button1 {
      display:block;
      margin:0.4em auto;
     }
    }
  </style>
</head>

<body>
  <div class="container">
    <main class="main">
      <img src="/logo.png" alt="Mokotahi Studios" />
    </main>
      <section>
        <p>Mokotahi Studios is a bespoke digital agency crafting elegant web applications.</p>
      </section>
     <section>
       <a class="button1" href="https://careers.mokotahi.com">View open positions</a>
    </section>

  </div>
</body>

</html>
